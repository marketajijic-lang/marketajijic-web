<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed — Market Ajijic</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✅</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #263238;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 77, 64, 0.15);
    }
    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #00897b;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      animation: pop 0.4s ease-out;
    }
    @keyframes pop {
      0% { transform: scale(0); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    h1 {
      font-size: 28px;
      color: #00695c;
      margin-bottom: 12px;
      font-weight: 700;
    }
    p {
      font-size: 16px;
      color: #546e7a;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .instructions {
      background: #f1f8f7;
      border-left: 4px solid #00897b;
      padding: 16px 20px;
      border-radius: 8px;
      text-align: left;
      margin-top: 24px;
    }
    .instructions strong { color: #00695c; }
    .footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #eceff1;
      font-size: 13px;
      color: #90a4ae;
    }
    .footer a { color: #00897b; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">✓</div>
    <h1>Email Confirmed!</h1>
    <p>Welcome to Market Ajijic. Your account is now active.</p>
    <div class="instructions">
      <p><strong>Next step:</strong></p>
      <p style="margin-top: 8px; margin-bottom: 0;">Open the Market Ajijic app on your phone and sign in with your email and password.</p>
    </div>
    <div class="footer">
      Need help? <a href="mailto:hello@marketajijic.com">hello@marketajijic.com</a>
    </div>
  </div>
</body>
</html>
